name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  bloglist-backend:
    name: Bloglist Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: part4/bloglist
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      MONGODB_URI: mongodb://127.0.0.1:27017/bloglist
      DEV_MONGODB_URI: mongodb://127.0.0.1:27017/bloglist-dev
      TEST_MONGODB_URI: mongodb://127.0.0.1:27017/bloglist-test
      SECRET: testsecret
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: part4/bloglist/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

  frontends:
    name: Frontend Checks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - part5/bloglist-frontend
          - part7/bloglist-frontend-redux
    defaults:
      run:
        working-directory: ${{ matrix.project }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.project }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
