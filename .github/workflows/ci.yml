name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  bloglist-backend:
    name: Bloglist Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: part4/bloglist
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
    env:
      MONGODB_URI: mongodb://127.0.0.1:27017/bloglist
      DEV_MONGODB_URI: mongodb://127.0.0.1:27017/bloglist-dev
      TEST_MONGODB_URI: mongodb://127.0.0.1:27017/bloglist-test
      SECRET: testsecret
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: part4/bloglist/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Wait for MongoDB
        run: |
          for i in {1..30}; do
            if node -e "const net=require('node:net'); const socket=net.createConnection(27017,'127.0.0.1'); socket.on('connect',()=>{socket.end();process.exit(0)}); socket.on('error',()=>process.exit(1));"; then
              exit 0
            fi
            sleep 2
          done
          echo "MongoDB did not become ready in time"
          exit 1

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

  frontends:
    name: Frontend Checks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - part5/bloglist-frontend
          - part7/bloglist-frontend-redux
    defaults:
      run:
        working-directory: ${{ matrix.project }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.project }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
